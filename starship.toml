"$schema" = 'https://starship.rs/config-schema.json'

format = """
$username\
$directory\
$git_branch\
$git_commit\
$git_state\
$git_status\
[ ](fg:prev_bg)\
"""

right_format = """
$status\
$cmd_duration\
$python\
$time\
"""

add_newline = false

[username]
style_root = "bg:red"
format = '[ $user ]($style)[](fg:red bg:blue)'

[directory]
style = "bg:blue"
format = "[ $path ]($style)"
truncation_length = 4
truncate_to_repo = false 
fish_style_pwd_dir_length=1
truncation_symbol = "…/"

[directory.substitutions]
"/" = "  "

[git_branch]
symbol = ""
style = "bg:black"
truncation_length = 25
only_attached = true
format = '[ ](fg:prev_bg bg:black)[$symbol$branch ]($style)'

[git_commit]
style = "bg:black"
only_detached = true
format = '[ ](fg:prev_bg bg:black)[$hash ($tag )]($style)'

[git_state]
style = "bg:black"
format = '([$state ($progress_current/$progress_total)])($style)'

[git_status]
style = "bg:black"
ahead = '⇡$count '
behind = '⇣$count '
diverged = '⇣$behind_count ⇡$ahead_count '
untracked = '?$count '
stashed = '*$count '
modified = '!$count '
staged = '+$count '
renamed = '»$count '
deleted = '✘$count '
format = '([($all_status)($ahead_behind)]($style))'

[cmd_duration]
style = "bg:yellow fg:black"
format = '[](bg:prev_bg fg:yellow)[ $duration ]($style)'

[status]
style = "bg:red fg:bright-yellow"
symbol = "✘"
disabled = false
format = '[](bg:prev_bg fg:red)[ $symbol$status ]($style)'

[python]
# Only show python if a venv is active.
style = "bg:black fg:bright-cyan"
symbol = ""
detect_extensions = []
detect_files = []
generic_venv_names = ["venv"]
format = '[](fg:black bg:prev_bg)[ ${symbol} (${version} )(\($virtualenv\) )]($style)'

[time]
disabled = false
time_format = "%-I:%M %p"
style = "bg:white fg:black"
format = '[](fg:white bg:prev_bg)[ $time ]($style)'
